name=PCMFlowG722
version=0.2.0
author=TANAKA Masayuki
maintainer=TANAKA Masayuki
sentence=G.722 wideband (HD voice) codec add-on for PCMFlow, focused on real-time voice (VoIP, ESP-NOW transceivers).
paragraph=ITU-T G.722 wideband codec (16 kHz, 64 kbps) for PCMFlow. Exposes G722Encoder / G722Decoder via PCMFlow's PCMSink / PCMSource interfaces. Built on the sippy/libg722 public-domain core (Steve Underwood / CMU). Suitable for ESP-NOW, RTP payload type 9, UDP, and WebSocket carriers. HD voice quality at the same 64 kbps as G.711.
category=Signal Input/Output
url=https://github.com/tanakamasayuki/PCMFlowG722
architectures=*
depends=PCMFlow
includes=PCMFlowG722.h
